# Tooling config only (no packaging). Lint: `ruff check .` — Types: `mypy src`.

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# pycodestyle, pyflakes, isort, pyupgrade, flake8-bugbear.
select = ["E", "F", "I", "UP", "B", "W"]
ignore = [
    "E501",  # line length is enforced by the formatter, not the linter
    "B008",  # false positives on FastAPI/typer-style defaults
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]
# Both entrypoints run setup code (sys.path / stdout reconfigure / logging)
# before their imports by design.
"ui/app.py" = ["E402"]
"src/main.py" = ["E402"]

[tool.mypy]
python_version = "3.10"
platform = "linux"              # match CI so local checks catch the same issues
ignore_missing_imports = true   # anthropic/faster-whisper/streamlit stubs vary
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
# Pragmatic, not strict — this is an app, not a library.
disallow_untyped_defs = false
exclude = ["tests/", "\\.venv/"]
