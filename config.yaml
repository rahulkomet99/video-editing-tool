# Automated Video Editing Pipeline configuration.

# ---- Edit decisioning (Claude API) ----
claude:
  model: claude-opus-4-8
  effort: high            # low | medium | high | xhigh | max
  max_tokens: 8000
  # Frames sampled per clip and shown to Claude so it can SEE the footage and
  # choose real cut points / accurate captions. 0 disables vision (metadata
  # only). More frames = better decisions but higher token cost.
  keyframes_per_clip: 4
  # Server-side web search tool version. Use web_search_20250305 on older models.
  web_search_tool: web_search_20260209
  # Content-aware trends: frames Claude sees to figure out what the footage is
  # about, so it can find *related* trends. Total across clips capped below.
  analysis_frames_per_clip: 2
  analysis_max_frames: 8
  # Token cost estimate (USD per 1M tokens) for the logged usage line. Exact
  # token counts come from the API; only the $ figure uses these rates.
  pricing:
    input: 15.0
    output: 75.0
    cache_write: 18.75
    cache_read: 1.5

# ---- Trend ingestion ----
ingestion:
  # Ordered list of sources to pull trends from. Sources that require
  # credentials are skipped (with a warning) when creds are missing.
  #   web_search    : Claude's live web search (needs Anthropic key). Best.
  #   google_trends : daily-trends RSS. NOTE: Google largely retired this feed;
  #                   often returns nothing now. Kept for completeness.
  #   reddit        : free OAuth API. Needs REDDIT_CLIENT_ID / _SECRET.
  #   local         : reads data/topics.json (always available fallback).
  sources: [web_search, local]
  google_trends:
    geo: US             # US, IN, GB, ...
  reddit:
    subreddits: [videos, popular]
    limit: 10
  max_trends: 8         # cap total trends considered per run

# ---- HTTP service (job API) ----
# Run with: uvicorn src.service.api:create_app --factory
service:
  api_keys: []            # e.g. ["k_live_abc:alice"]; empty = open dev mode
  db_path: output/jobs.db
  storage_dir: output/renders
  max_workers: 2          # concurrent renders on this node

# ---- Upload limits (UI) ----
# Guard against oversized/long uploads that could hang or overload rendering.
uploads:
  max_upload_mb: 300      # per-file cap for clips/music/logo
  max_clips: 25           # max clips in the assets library
  max_duration_s: 900     # reject clips longer than this (15 min)

# ---- Source media ----
media:
  # Folder of source clips the editor can cut from.
  assets_dir: assets
  # ffprobe/ffmpeg executables. Bare names require FFmpeg on PATH (open a fresh
  # terminal after installing). If it isn't on PATH, set an absolute path here
  # locally — but don't commit a machine-specific path.
  ffmpeg: ffmpeg
  ffprobe: ffprobe

# ---- Rendering (FFmpeg) ----
render:
  backend: ffmpeg
  output_dir: output
  # Target short-form vertical format.
  width: 1080
  height: 1920
  fps: 30
  # Encoder settings.
  video_codec: libx264
  audio_codec: aac
  crf: 20
  preset: medium
  # Burn captions into the video.
  captions: true
  # Font used for burned-in captions. If unset, a system font is auto-detected
  # (Arial on Windows/macOS, DejaVuSans on Linux). Set an explicit .ttf path to
  # override, e.g. font: C:\Windows\Fonts\segoeui.ttf
  # font:
  # Caption mode:
  #   manual : burn the per-cut captions Claude writes (styled, bold, outlined)
  #   auto   : transcribe speech with faster-whisper and burn word-by-word
  #            animated captions (karaoke highlight). Needs faster-whisper; adds
  #            a model load + a second render pass. Best for talking footage.
  #   off    : no burned captions (text overlays/titles still render)
  captions_mode: manual
  whisper_model: base              # tiny | base | small | medium (bigger = slower/better)
  caption_highlight: "#FFE000"     # colour a word turns as it's spoken (auto mode)
  # Caption styling for MANUAL captions. The clean "social" look is a heavy bold
  # font with a thick outline + drop shadow and NO box. A bold system font is
  # auto-picked above.
  caption_size: 64
  caption_box: false               # solid box behind the text (usually off)
  caption_position: bottom         # bottom | center | top

  # ---- Color / look ----
  # Fallback color grade if an edit doesn't specify one. Named looks: none,
  # clean, vibrant, cinematic, warm, cool, moody, vintage, bw. Claude usually
  # sets this per video; the manual editor can override.
  look: clean
  # Optional 3D LUT (.cube) applied on top of every cut for a signature/branded
  # grade. Give a path, or a bare name found in luts_dir. Leave blank for none.
  lut:
  luts_dir: assets/luts

  # Hard ceiling (seconds) on a single ffmpeg pass. A malformed/oversized input
  # can't hang a worker forever — the encode is killed and the render errors.
  render_timeout: 600

  # ---- Effects ----
  # Crossfade duration (s) between cuts when the edit uses transition=crossfade.
  transition_duration: 0.5
  # Gentle fade-in/out on the whole video (seconds; 0 disables).
  final_fade: 0.3
  # Ken Burns zoom rate (fraction added per frame) when a cut sets zoom in/out.
  zoom_rate: 0.004

  # ---- Background music (optional) ----
  # Path to a music file mixed under the video. Leave blank for none.
  # The UI also lets you upload one per run.
  music:
  music_volume: 0.25               # 0..1, relative to original audio

  # ---- Logo / watermark (optional) ----
  # PNG (ideally with transparency) composited over the whole video for branding.
  # The UI also lets you upload one per run.
  logo:
  logo_x: 0.85                     # center X, 0=left..1=right
  logo_y: 0.07                     # center Y, 0=top..1=bottom
  logo_scale: 0.16                 # width as fraction of frame
  logo_opacity: 0.9
